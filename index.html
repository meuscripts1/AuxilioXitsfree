<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Xits Free</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1f;
      color: #e0e0ff;
      overflow: hidden;
    }

    /* Partículas de fundo */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    canvas {
      display: block;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .painel {
      background: rgba(20, 20, 60, 0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 120, 255, 0.25);
      border-radius: 16px;
      padding: 40px 50px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(167,139,250,0.4);
    }

    .foto {
      width: 180px;
      height: 180px;
      margin: 25px auto;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid rgba(120, 140, 255, 0.4);
      box-shadow: 0 0 30px rgba(100, 120, 255, 0.35);
    }

    .foto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .key-box {
      margin: 30px 0 40px;
      padding: 18px 24px;
      background: rgba(30, 30, 80, 0.7);
      border: 1px solid #5a6aff;
      border-radius: 12px;
      font-family: monospace;
      font-size: 1.4rem;
      letter-spacing: 3px;
      color: #c4d0ff;
      user-select: all;
    }

    button {
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      color: white;
      border: none;
      padding: 16px 48px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 25px rgba(124,58,237,0.4);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(124,58,237,0.55);
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

<div id="particles"></div>

<div class="container">
  <div class="painel">
    <h1>Painel Xits Free</h1>
    
    <div class="foto">
      <!-- Coloque aqui a URL da foto que você quer (ou deixe uma padrão) -->
      <img src="https://images.unsplash.com/photo-1617791160505-6f00504e3519?w=400&q=80" alt="foto painel">
    </div>

    <div class="key-box">
      XitsFree1500
    </div>

    <button onclick="alert('Key copiada! → XitsFree1500')">
      Entrar com a Key
    </button>
  </div>
</div>

<!-- tsParticles (partículas retorcidas/movimento orgânico) -->
<script src="https://cdn.jsdelivr.net/npm/@tsparticles/all@3.5.0/tsparticles.all.min.js"></script>
<script>
  tsParticles.load("particles", {
    fullScreen: { enable: true },
    fpsLimit: 90,
    particles: {
      number: { value: 80, density: { enable: true, value_area: 900 } },
      color: { value: ["#7c3aed", "#a78bfa", "#6366f1", "#8b5cf6"] },
      shape: { type: "circle" },
      opacity: { value: 0.45, random: true, animation: { enable: true, speed: 1.2, minimumValue: 0.1 } },
      size: { value: { min: 1, max: 5 }, random: true, animation: { enable: true, speed: 3 } },
      move: {
        enable: true,
        speed: { min: 0.4, max: 1.8 },
        direction: "none",
        random: true,
        straight: false,
        outModes: { default: "out" },
        attract: { enable: true, rotateX: 600, rotateY: 1200 },
        trail: { enable: false }
      },
      interactivity: {
        detectsOn: "canvas",
        events: {
          onHover: { enable: true, mode: "grab" },
          resize: true
        },
        modes: {
          grab: { distance: 180, links: { opacity: 0.5 } }
        }
      },
      links: {
        enable: true,
        distance: 140,
        color: "#a78bfa",
        opacity: 0.35,
        width: 1.2
      }
    },
    detectRetina: true
  });
</script>

</body>
</html>
